.cartScreen {display:none;padding:15px;}
#formScreen {display:none;padding:15px;}
input {width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;}
button {padding:8px 12px;border:none;border-radius:8px;}

// MENU
function renderMenu(){
    const grid = document.getElementById("menu");
    grid.innerHTML="";

    MENU.forEach(item=>{
        grid.innerHTML += `
        <div class="card">
            <img src="${item.img}">
            <button class="add-btn"
                data-name="${item.name}"
                data-price="${item.price}"
                onclick="addItem(this)">+</button>
            <div class="info">
                <div>${item.name}</div>
                <div>${item.price} so'm</div>
            </div>
        </div>`;
    });
}

// ADD
function addItem(btn){
    const name = btn.getAttribute("data-name");
    const price = parseInt(btn.getAttribute("data-price"));

    const found = cart.find(i => i.name === name);

    if(found){
        found.qty++;
    } else {
        cart.push({name, price, qty:1});
    }

    updateAll();
}

// +/- 
function increaseItem(btn){
    const name = btn.getAttribute("data-name");
    const item = cart.find(i => i.name === name);
    if(item) item.qty++;
    updateAll();
}

function decreaseItem(btn){
    const name = btn.getAttribute("data-name");
    const index = cart.findIndex(i => i.name === name);

    if(index !== -1){
        cart[index].qty--;
        if(cart[index].qty <= 0){
            cart.splice(index,1);
        }
    }

    updateAll();
}

// UPDATE
function updateAll(){
    renderCart();
    renderBadge();
}

// BADGE
function renderBadge(){
    const count = cart.reduce((s,i)=>s+i.qty,0);
    document.getElementById("cartCount").innerText = count;
}

// TOTAL
function getTotal(){
    return cart.reduce((s,i)=>s+i.price*i.qty,0);
}

// CART UI
function renderCart(){
    const div = document.getElementById("cartScreen");

    if(cart.length===0){
        div.innerHTML="Savat bo'sh";
        return;
    }

    let html="";

    cart.forEach(i=>{
        html += `
        <div style="margin-bottom:15px;border-bottom:1px solid #333;padding-bottom:10px;">
            <div>${i.name}</div>

            <div style="display:flex;gap:10px;align-items:center;margin-top:5px;">
                <button data-name="${i.name}" onclick="decreaseItem(this)">−</button>
                <b>${i.qty}</b>
                <button data-name="${i.name}" onclick="increaseItem(this)">+</button>
                <span>${i.price*i.qty} so'm</span>
            </div>
        </div>`;
    });

    html += `<hr><b>Jami: ${getTotal()} so'm</b><br><br>`;
    html += `<button onclick="goCheckout()">Buyurtma berish</button>`;

    div.innerHTML = html;
}

// NAV
function showCart(){
    document.getElementById("menu").style.display="none";
    document.getElementById("cartScreen").style.display="block";
    renderCart();
}

function showHome(){
    document.getElementById("menu").style.display="grid";
    document.getElementById("cartScreen").style.display="none";
    document.getElementById("formScreen").style.display="none";
}

function goCheckout(){
    document.getElementById("cartScreen").style.display="none";
    document.getElementById("formScreen").style.display="block";
}

// 📍 LOCATION
function getLocation(){
    navigator.geolocation.getCurrentPosition(pos=>{
        locationData = {
            lat: pos.coords.latitude,
            lon: pos.coords.longitude
        };
        document.getElementById("locStatus").innerText = "OK";
    }, ()=>{
        alert("Lokatsiya ruxsat berilmadi");
    });
}

// ORDER
function submitOrder(){
    const name=document.getElementById("name").value.trim();
    const phone=document.getElementById("phone").value.replace(/\D/g,"");
    const address=document.getElementById("address").value;

    if(name.length<2) return alert("Ism xato");
    if(phone.length!==9) return alert("Telefon 9 ta raqam bo‘lsin");
    if(!locationData) return alert("Lokatsiyani oling");

    tg.sendData(JSON.stringify({
        name,
        phone,
        address,
        location: locationData,
        items:cart,
        total:getTotal()
    }));
}
