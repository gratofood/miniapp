<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Menu</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {margin:0;font-family:sans-serif;background:#f2f2f7;}
.header {padding:16px;font-size:22px;font-weight:600;}
.grid {display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:10px;}
.card {background:white;border-radius:16px;padding:10px;}
.card img {width:100%;height:120px;object-fit:cover;border-radius:12px;}
.add-btn {position:absolute;right:10px;bottom:10px;width:40px;height:40px;border-radius:50%;border:none;background:black;color:white;font-size:22px;}
.card-wrap {position:relative;}
.cart {position:fixed;bottom:0;width:100%;background:white;padding:15px;border-top:1px solid #ddd;}
.remove {background:red;color:white;border:none;border-radius:8px;padding:4px 8px;margin-left:10px;}
#formScreen {display:none;padding:15px;}
.form-card {background:white;border-radius:16px;padding:15px;margin-bottom:10px;}
input {width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;}
.primary-btn {width:100%;padding:14px;border:none;border-radius:12px;background:black;color:white;}
</style>
</head>

<body>

<div class="header">🍔 Menu</div>

<div class="grid" id="menuGrid">
<div class="card">
<div class="card-wrap">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<button class="add-btn" onclick="add('Burger')">+</button>
</div> Burger
</div>

<div class="card">
<div class="card-wrap">
<img src="https://images.unsplash.com/photo-1604908176997-431efae1b1d1">
<button class="add-btn" onclick="add('Lavash')">+</button>
</div> Lavash
</div>

<div class="card">
<div class="card-wrap">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<button class="add-btn" onclick="add('Cola')">+</button>
</div> Cola
</div>
</div>

<div class="cart" id="cart">Savat bo'sh</div>

<div id="formScreen">

<div class="form-card">
<input id="name" placeholder="Ismingiz">
</div>

<div class="form-card">
<input id="phone" placeholder="901234567" maxlength="9" inputmode="numeric">
</div>

<div class="form-card">
<button onclick="getLocation()" style="width:100%;padding:10px;">Lokatsiya olish</button>
<div id="locStatus">Hali olinmadi</div>
<input id="address" placeholder="Uy, kvartira">
</div>

<button class="primary-btn" onclick="submitOrder()">Yuborish</button>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let cart = [];
let locationData = null;

// phone only numbers
document.getElementById("phone")?.addEventListener("input", function(e){
    e.target.value = e.target.value.replace(/\D/g, "").slice(0,9);
});

function add(item){
    cart.push(item);
    renderCart();
}

function removeItem(item){
    const i = cart.indexOf(item);
    if(i>-1) cart.splice(i,1);
    renderCart();
}

function renderCart(){
    const div = document.getElementById("cart");

    if(cart.length===0){
        div.innerHTML="Savat bo'sh";
        tg.MainButton.hide();
        return;
    }

    let counts={};
    cart.forEach(i=>counts[i]=(counts[i]||0)+1);

    let html="";
    for(let item in counts){
        html+=`${item} x${counts[item]} <button onclick="removeItem('${item}')">❌</button><br>`;
    }

    div.innerHTML=html;
    tg.MainButton.setText("Buyurtma berish");
    tg.MainButton.show();
}

tg.MainButton.onClick(function(){
    document.getElementById("menuGrid").style.display="none";
    document.getElementById("cart").style.display="none";
    document.getElementById("formScreen").style.display="block";
    tg.MainButton.hide();
});

function getLocation(){
    const status=document.getElementById("locStatus");

    navigator.geolocation.getCurrentPosition(
        pos=>{
            locationData={
                lat:pos.coords.latitude,
                lon:pos.coords.longitude
            };
            status.innerText="Lokatsiya olindi ✅";
        },
        ()=>status.innerText="Ruxsat berilmadi ❌"
    );
}

function submitOrder(){
    const name=document.getElementById("name").value.trim();
    const phone=document.getElementById("phone").value.trim();
    const address=document.getElementById("address").value.trim();

    const cleanPhone=phone.replace(/\D/g,"");

    if(name.length<2) return alert("Ism xato");
    if(cleanPhone.length!==9) return alert("Telefon 9 ta raqam bo‘lsin");
    if(!locationData) return alert("Lokatsiyani oling");

    const order={
        name,
        phone:cleanPhone,
        address,
        location:locationData,
        items:cart
    };

    tg.sendData(JSON.stringify(order));
}
</script>

</body>
</html>
