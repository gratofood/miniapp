<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Menu</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#f2f2f7;
}
.header {
    padding:16px;
    font-size:22px;
    font-weight:600;
}
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:10px;
}
.card {
    background:white;
    border-radius:16px;
    padding:10px;
}
.card img {
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:12px;
}
.title { font-weight:600; margin-top:8px; }
.price { color:#666; font-size:14px; }
.add-btn {
    position:absolute;
    right:10px;
    bottom:10px;
    width:40px;
    height:40px;
    border-radius:50%;
    border:none;
    background:black;
    color:white;
    font-size:22px;
}
.card-wrap { position:relative; }

.cart {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:15px;
    border-top:1px solid #ddd;
}
.remove {
    background:red;
    color:white;
    border:none;
    border-radius:8px;
    padding:4px 8px;
    margin-left:10px;
}

/* FORM */
#formScreen {
    display:none;
    padding:15px;
}
.form-card {
    background:white;
    border-radius:16px;
    padding:15px;
    margin-bottom:10px;
}
.form-title {
    font-weight:600;
    margin-bottom:8px;
}
input {
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:10px;
}
.primary-btn {
    width:100%;
    padding:14px;
    font-weight:600;
    border:none;
    border-radius:12px;
    background:black;
    color:white;
}
</style>
</head>

<body>

<div class="header">🍔 Menu</div>

<div class="grid" id="menuGrid">

<div class="card">
<div class="card-wrap">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<button class="add-btn" onclick="add('Burger')">+</button>
</div>
<div class="title">Burger</div>
<div class="price">25 000 so'm</div>
</div>

<div class="card">
<div class="card-wrap">
<img src="https://images.unsplash.com/photo-1604908176997-431efae1b1d1">
<button class="add-btn" onclick="add('Lavash')">+</button>
</div>
<div class="title">Lavash</div>
<div class="price">30 000 so'm</div>
</div>

<div class="card">
<div class="card-wrap">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<button class="add-btn" onclick="add('Cola')">+</button>
</div>
<div class="title">Cola</div>
<div class="price">10 000 so'm</div>
</div>

</div>

<div class="cart" id="cart">Savat bo'sh</div>

<!-- FORM -->
<div id="formScreen">

    <div class="form-card">
        <div class="form-title">👤 Ism</div>
        <input id="name" placeholder="Ismingiz">
    </div>

    <div class="form-card">
        <div class="form-title">📞 Telefon</div>
        <input id="phone" placeholder="+998901234567">
    </div>

    <div class="form-card">
        <div class="form-title">📍 Lokatsiya</div>

        <button onclick="getLocation()" style="width:100%; padding:10px; margin-bottom:8px;">
            Lokatsiyani olish
        </button>

        <div id="locStatus" style="font-size:14px; color:#666;">
            Hali olinmadi
        </div>

        <input id="address" placeholder="Qo‘shimcha izoh (uy, kvartira)" style="margin-top:8px;">
    </div>

    <button class="primary-btn" onclick="submitOrder()">
        Buyurtmani yuborish
    </button>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let cart = [];
let locationData = null;

// ADD
function add(item){
    cart.push(item);
    renderCart();
}

// REMOVE
function removeItem(item){
    const i = cart.indexOf(item);
    if(i > -1) cart.splice(i,1);
    renderCart();
}

// RENDER
function renderCart(){
    const div = document.getElementById("cart");

    if(cart.length === 0){
        div.innerHTML = "Savat bo'sh";
        tg.MainButton.hide();
        return;
    }

    let counts = {};
    cart.forEach(i => counts[i] = (counts[i]||0)+1);

    let html = "";
    for(let item in counts){
        html += `
        <div>
            ${item} x${counts[item]}
            <button class="remove" onclick="removeItem('${item}')">❌</button>
        </div>`;
    }

    div.innerHTML = html;

    tg.MainButton.setText("Buyurtma berish");
    tg.MainButton.show();
}

// FORMGA O'TISH
tg.MainButton.onClick(function(){
    if(cart.length === 0){
        alert("Savat bo'sh ❌");
        return;
    }

    document.getElementById("menuGrid").style.display = "none";
    document.getElementById("cart").style.display = "none";
    document.getElementById("formScreen").style.display = "block";

    tg.MainButton.hide();
});

// LOCATION
function getLocation(){
    const status = document.getElementById("locStatus");

    if(!navigator.geolocation){
        status.innerText = "Geolocation ishlamaydi ❌";
        return;
    }

    status.innerText = "Yuklanmoqda...";

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            locationData = {lat, lon};

            status.innerText = `📍 ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
        },
        () => {
            status.innerText = "Ruxsat berilmadi ❌";
        }
    );
}

// SUBMIT
function submitOrder(){
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();

    if(name.length < 2){
        alert("Ism noto‘g‘ri ❌");
        return;
    }

    if(!phone.startsWith("+998") || phone.length !== 13){
        alert("Telefon: +998XXXXXXXXX ❌");
        return;
    }

    if(!locationData){
        alert("Lokatsiyani oling ❌");
        return;
    }

    const order = {
        name,
        phone,
        address,
        location: locationData,
        items: cart
    };

    tg.sendData(JSON.stringify(order));
}
</script>

</body>
</html>
