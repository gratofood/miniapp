<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menyu</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {margin:0;font-family:sans-serif;background:#0f0f0f;color:white;}
h2 {text-align:center;margin:10px 0;}

.search-wrap {display:flex;justify-content:center;padding:0 15px 10px;}
#searchInput {width:100%;padding:10px;border-radius:12px;border:1px solid #333;background:#1a1a1a;color:#fff;}

.buttons {display:flex;justify-content:center;gap:10px;margin-bottom:10px;}
button {padding:10px 15px;border:none;border-radius:20px;background:#222;color:white;cursor:pointer;}
button.active {background:#ef7918;}

.menu {display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:15px;}

.card {position:relative;border-radius:15px;overflow:hidden;}
.card img {width:100%;height:180px;object-fit:cover;}

.add-btn {
position:absolute;
top:10px;
right:10px;
background:#ef7918;
border:none;
border-radius:50%;
width:40px;
height:40px;
color:white;
font-size:20px;
}

.info {position:absolute;bottom:0;width:100%;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,0.9));}
.info h3 {margin:0;font-size:16px;}
.info p {margin:5px 0 0;color:#ef7918;font-weight:bold;}

.cart {
position:fixed;
bottom:0;
width:100%;
background:black;
padding:10px;
}

/* FORM */
#formScreen {display:none;padding:15px;}
.form-card {background:white;color:black;border-radius:12px;padding:10px;margin-bottom:10px;}
input {width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;}
.primary-btn {width:100%;padding:14px;background:#ef7918;color:white;border:none;border-radius:12px;}
</style>
</head>

<body>

<h2>Menyu</h2>

<div class="search-wrap">
<input id="searchInput" placeholder="Qidirish...">
</div>

<div class="buttons">
<button onclick="filter('all', this)" class="active">Hammasi</button>
<button onclick="filter('first', this)">1-taom</button>
<button onclick="filter('second', this)">2-taom</button>
<button onclick="filter('salat', this)">Salat</button>
</div>

<div class="menu" id="menu"></div>

<div class="cart" id="cart">Savat bo'sh</div>

<!-- FORM -->
<div id="formScreen">
<div class="form-card">
<input id="name" placeholder="Ismingiz">
</div>

<div class="form-card">
<input id="phone" placeholder="901234567" maxlength="9">
</div>

<div class="form-card">
<button onclick="getLocation()">Lokatsiya olish</button>
<div id="locStatus">Hali olinmadi</div>
<input id="address" placeholder="Uy, kvartira">
</div>

<button class="primary-btn" onclick="submitOrder()">Yuborish</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let cart = [];
let locationData = null;

// 🔥 MENU (SENING RASMLAR)
const MENU = [
{type:"first", name:"Tushonka sho'rva", price:"40000", img:"gratofood/images/1-taom/optimized_1.webp"},
{type:"second", name:"Go'shtli somsa", price:"7000", img:"images/optimized_batch2_4.webp"},
{type:"salat", name:"Adana salati", price:"40000", img:"images/Salatlar/Adana.webp"}
];

// RENDER
function renderMenu(){
    const grid=document.getElementById("menu");
    grid.innerHTML="";

    MENU.forEach(item=>{
        grid.innerHTML+=`
        <div class="card ${item.type}">
        <img src="${item.img}">
        <button class="add-btn" onclick="add('${item.name}')">+</button>
        <div class="info">
        <h3>${item.name}</h3>
        <p>${item.price} so'm</p>
        </div>
        </div>`;
    });
}

function add(item){
    cart.push(item);
    renderCart();
}

function renderCart(){
    if(cart.length===0){
        document.getElementById("cart").innerText="Savat bo'sh";
        tg.MainButton.hide();
        return;
    }

    let counts={};
    cart.forEach(i=>counts[i]=(counts[i]||0)+1);

    let text="";
    for(let i in counts){
        text+=`${i} x${counts[i]}\n`;
    }

    document.getElementById("cart").innerText=text;

    tg.MainButton.setText("Buyurtma");
    tg.MainButton.show();
}

tg.MainButton.onClick(()=>{
document.querySelector(".menu").style.display="none";
document.getElementById("cart").style.display="none";
document.getElementById("formScreen").style.display="block";
tg.MainButton.hide();
});

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
locationData={lat:pos.coords.latitude,lon:pos.coords.longitude};
document.getElementById("locStatus").innerText="OK";
});
}

function submitOrder(){
const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value.replace(/\D/g,"");
const address=document.getElementById("address").value;

if(name.length<2) return alert("Ism xato");
if(phone.length!==9) return alert("9 ta raqam kiriting");
if(!locationData) return alert("Lokatsiya yo‘q");

tg.sendData(JSON.stringify({
name,
phone,
address,
location:locationData,
items:cart
}));
}

// filter + search
let currentFilter="all";
const searchInput=document.getElementById("searchInput");

function apply(){
const q=searchInput.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
const title=c.innerText.toLowerCase();
const show=(currentFilter==="all"||c.classList.contains(currentFilter)) && title.includes(q);
c.style.display=show?"block":"none";
});
}

function filter(type,btn){
currentFilter=type;
document.querySelectorAll(".buttons button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
apply();
}

searchInput.addEventListener("input",apply);

renderMenu();
</script>

</body>
</html>
